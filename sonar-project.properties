sonar.projectKey=FrancoLiberali_terrace-challenge
sonar.organization=francoliberali

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Don't analyse cmd/ (wiring + diagnostics — exercised by live smoke
# tests, not unit tests) or generated ABI files.
sonar.exclusions=cmd/**,**/abi.go

# Coverage report produced by `go test -coverprofile=coverage.out`.
sonar.go.coverage.reportPaths=coverage.out

# cmd/ is also excluded from the coverage metric so the badge reflects
# the testable surface only.
sonar.coverage.exclusions=cmd/**

# Suppress go:S3776 (cognitive complexity) for test files. The rule is
# designed for production-code maintainability; Go test patterns
# (fixture servers that dispatch by request shape, table-driven cases
# with per-row error paths, multi-step setup → exercise → multi-
# assertion blocks) inherently produce branching that the 15-point cap
# flags without indicating a real smell.
sonar.issue.ignore.multicriteria=tests-cognitive-complexity
sonar.issue.ignore.multicriteria.tests-cognitive-complexity.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.tests-cognitive-complexity.resourceKey=**/*_test.go
